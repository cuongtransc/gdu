min_version = "2024.12.0"

[tools]
go = "1.26"

[tasks.build]
description = "Build gdu binary into dist/"
sources = ["go.mod", "go.sum", "cmd/**/*.go", "internal/**/*.go", "pkg/**/*.go", "tui/**/*.go", "stdout/**/*.go", "report/**/*.go"]
outputs = ["dist/gdu"]
run = "CGO_ENABLED=0 go build -pgo=default.pgo -o dist/gdu ./cmd/gdu"

[tasks.test]
description = "Run all tests"
run = "go test ./..."

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run -c .golangci.yml"

[tasks.ci]
description = "Run lint and test"
depends = ["lint", "test"]
